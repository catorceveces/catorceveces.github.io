---
layout: default
---

<section id="intro">
    <div class="flex-row-between">
        <h1>> Matías_ <br><a href="http://twitter.com/catorceveces" style="color:#55ACEE;">> Twitter_</a></h1>
        <button id="theme-toggle" onclick="modeSwitcher()">
            <div></div>
        </button>
    </div>
    <br />
    <hr>
</section>

<section class="posts">
    <ul>
        {% for post in site.posts limit:10 %}
        <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
        <li>
            {{ post.content | strip_html | truncatewords:30 }}
        </li>
        <br>
        {% endfor %}
    </ul>
</section>
